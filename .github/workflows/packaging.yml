#
# 打包Amlogic/Rockchip固件,请勿修改文件名称（packaging.yml）
#

name: 打包Amlogic/Rockchip固件
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '选择源码(先确认您已经编译了有)'
        required: true
        default: 'Lede'
        type: choice
        options:
          - 'Lede'
          - 'Immortalwrt'
          - 'Lienol'
          - 'Official'
          - 'Xwrt'
          - 'Mt798x'
      amlogic_model:
        description: '输入机型,比如：s905d 或 s905d_s905x2'
        required: true
        default: 's905d'
      amlogic_kernel:
        description: '输入内核,比如：5.10.172 或 5.15.97_6.1.16'
        required: true
        default: '5.10.172'
      kernel_usage:
        description: "内核仓库：stable、dev、flippy、rk3588"
        required: true
        default: 'stable'
        type: choice
        options:
          - 'stable'
          - 'dev'
          - 'flippy'
          - 'rk3588'
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
      auto_kernel:
        description: '是否自动检测最新内核'
        required: false
        default: 'true'
        type: boolean
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - yourname
      UPLOAD_FIRMWARE:
        description: '上传固件到 Github Artifacts'
        required: false
        default: 'false'
        type: boolean
      UPLOAD_RELEASE:
        description: '发布固件到 Github Releases'
        required: false
        default: 'true'
        type: boolean

env:
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}

jobs:
  build:
    name: 编译OpenWrt固件
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: 检测文件
      run: |
        cd $GITHUB_WORKSPACE
        echo "SOURCE=${{ inputs.source_branch }}" >> ${GITHUB_ENV}
        echo "amlogic_model=${{ inputs.amlogic_model }}" >> ${GITHUB_ENV}
        echo "amlogic_kernel=${{ inputs.amlogic_kernel }}" >> ${GITHUB_ENV}
        echo "auto_kernel=${{ inputs.auto_kernel }}" >> ${GITHUB_ENV}
        echo "kernel_repo=${{ inputs.kernel_repo }}" >> ${GITHUB_ENV}
        echo "kernel_usage=${{ inputs.kernel_usage }}" >> ${GITHUB_ENV}
        echo "builder_name=${{ inputs.builder_name }}" >> ${GITHUB_ENV}
        echo "TARGET_PROFILE=aarch_64" >> ${GITHUB_ENV}
        echo "UPLOAD_FIRMWARE=${{ inputs.UPLOAD_FIRMWARE }}" >> $GITHUB_ENV
        echo "UPLOAD_RELEASE=${{ inputs.UPLOAD_RELEASE }}" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 部署编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential rename pigz clang bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 打包固件
      working-directory: /workdir
      run: |
        mkdir -p openwrt/bin/targets
        ln -sf /workdir/openwrt ${GITHUB_WORKSPACE}/openwrt
        wget -q https://github.com/${{ github.repository }}/releases/download/targz/${SOURCE}-armvirt-64-default-rootfs.tar.gz -O ${GITHUB_WORKSPACE}/openwrt/bin/targets/openwrt-armvirt-64-default-rootfs.tar.gz
        echo "HOME_PATH=${GITHUB_WORKSPACE}/openwrt" >> $GITHUB_ENV
        echo "FIRMWARE_PATH=${GITHUB_WORKSPACE}/openwrt/bin/targets" >> $GITHUB_ENV

    - name: 自动打包aarch64系列固件
      id: compile
      uses: 281677160/common@aarch

    - name: 发布固件
      if: steps.compile.outcome == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.TARGET_PROFILE }}-${{ env.FILE_DATE }}
        tag: ${{ env.FILE_DATE }}
        token: ${{ secrets.REPO_TOKEN }}
        allowUpdates: true
        body: ${{ env.TARGET_PROFILE }}固件
        artifacts: "${{ env.FIRMWARE_PATH }}/*"
